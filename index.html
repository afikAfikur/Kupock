<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Tiro+Bangla:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <style>
      .poppins {
        font-family: "Poppins", sans-serif;

        font-style: normal;
      }
      .tiro-bangla-regular {
        font-family: "Tiro Bangla", serif;

        font-style: normal;
      }
    </style>
    <title>Kupock</title>
  </head>
  <body>
    <div
      class="navbar bg-blue-700 shadow-sm px-[40px] py-4 mix-blend-multiply shadow-lg"
    >
      <div class="flex-1">
        <h2 class="font-bold text-yellow-400 font-monospace text-[24px]">
          <span class="text-white font-sans">KU-</span>pock
        </h2>
      </div>
      <div class="flex gap-3">
        <button
          class="bg-white text-black px-4 py-1 rounded-[10px] border border-gray-200 transition-colors hover:bg-gray-100 cursor-pointer"
        >
          Faq
        </button>

        <button
          class="bg-white text-black px-4 py-1 rounded-xl border border-gray-200 transition-colors hover:bg-gray-100 cursor-pointer"
        >
          Learn
        </button>

        <button id="logout"
          class="bg-white text-black px-4 py-1 rounded-xl border border-gray-200 transition-colors hover:bg-gray-100 cursor-pointer hidden"
        >
          Logout
        </button>
      </div>
    </div>
    <div class="second flex flex-col lg:flex-row items-center justify-around  max-w-6xl mx-auto mt-[100px]  lg:gap-[400px]">
      <div class="w-100 flex flex-col gap-y-4">
        <h2 class="poppins font-bold text-[42px]">
          <span class="text-blue-600">English</span> is Easy!!
        </h2>
        <div>
          <p class="tiro-bangla-regular text-[24px]">
            আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
            আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে
            অন্য একটি Level এ
          </p>
          <button id="start" class="font-semibold text-[16px] btn btn-primary w-fit bg-blue-600 text-white px-3 rounded-3 mt-5">Get Started</button>
          <div id="login"
            class="card bg-base-100 w-80 hidden  "
          >
            <div class="form-control w-full flex flex-col gap-4">
              <label class="label">
                <span class="label-text"
                  >Enter Your phone/email <span class="text-secondary">*</span></span
                >
              </label>
              <input
                type="text"
                placeholder="Type here"
                class="input input-bordered w-full mb-4 px-2"
              />

              <label class="label">
                <span class="label-text"
                  >Password <span class="text-secondary">*</span></span
                >
              </label>
              <input
                type="password"
                placeholder="••••••••"
                class="input input-bordered w-full p-2"
              />

              <button class="font-semibold text-[16px] btn btn-primary w-fit bg-blue-600 text-white px-3 rounded-3">Log In</button>
            </div>
          </div>
        </div>
      </div>
      <div>
<img class="w-fit h-[400px]" src="./assets/hero-student.png" alt="">
      </div>
    </div>
    <script src="./script/index.js"></script>
  </body>
</html>
